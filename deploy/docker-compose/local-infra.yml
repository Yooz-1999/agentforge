services:
  mysql:
    image: mysql:8.4
    container_name: agentforge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: agentforge
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4
    container_name: agentforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  etcd:
    image: registry.k8s.io/etcd:3.5.14-0
    container_name: agentforge-etcd
    command:
      - /usr/local/bin/etcd
      - --name=agentforge-etcd
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
      - --initial-cluster=agentforge-etcd=http://127.0.0.1:2380
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/etcd-data

volumes:
  mysql-data:
  redis-data:
  etcd-data:
